name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ─── Backend Tests ───────────────────────────────────────────────────────────
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ─── Frontend Build ──────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/tmzon/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/tmzon
        run: npm ci

      - name: Build web app
        working-directory: app/tmzon
        run: npx expo export --platform web

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: app/tmzon/dist
          retention-days: 1

  # ─── Deploy to VPS ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            APP_DIR="$HOME/tmzon"

            echo "==> Pulling latest code"
            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              rm -rf "$APP_DIR"
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
              cd "$APP_DIR"
            fi

            echo "==> Building frontend"
            docker run --rm \
              -v "$APP_DIR/app/tmzon:/work" \
              -w /work \
              node:20-alpine \
              sh -c "npm ci --prefer-offline && npx expo export --platform web"

            echo "==> Checking Docker"
            docker --version
            docker compose version 2>/dev/null || docker-compose --version

            echo "==> Building and starting containers"
            docker compose pull mongo
            docker compose up -d --build --remove-orphans

            echo "==> Smoke test (waiting up to 30s for app to be ready)"
            for i in $(seq 1 6); do
              if curl -sf http://localhost/health; then
                echo "Health check passed"
                break
              fi
              if [ "$i" -eq 6 ]; then
                echo "Health check failed after 30s"
                docker compose logs app --tail=20
                exit 1
              fi
              echo "Waiting... ($i/6)"
              sleep 5
            done

            echo "==> Deployment complete"
            docker compose ps
