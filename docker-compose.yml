services:
  nginx:
    image: nginx:1.27-alpine
    container_name: tmzon-nginx
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - ./nginx/nginx.conf:/etc/nginx/templates/nginx.conf:ro
      - ./nginx/nginx-ssl.conf:/etc/nginx/templates/nginx-ssl.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - ./app/tmzon/dist:/usr/share/nginx/html:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      # IPv4 önce dene; bazı Alpine/Docker kurulumlarında nginx yalnızca IPv6'ya bind olur
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/nginx-health 2>/dev/null || wget -qO- http://[::1]/nginx-health 2>/dev/null']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  app:
    build: .
    container_name: tmzon-app
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/tmzon
      - JWT_SECRET=${JWT_SECRET:-changeme_secret}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET:-changeme_refresh_secret}
      - REFRESH_TOKEN_EXPIRES_IN=${REFRESH_TOKEN_EXPIRES_IN:-30d}
      - MAX_SESSIONS=${MAX_SESSIONS:-3}
      - FRONTEND_URL=${FRONTEND_URL:-https://tmzon.tech,http://144.172.107.118}
      - APP_URL=${APP_URL:-https://tmzon.tech}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@tmzon.tech}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-https://tmzon.tech/api/auth/google/callback}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_VERIFY_SERVICE_SID=${TWILIO_VERIFY_SERVICE_SID:-}
      - MAX_LOGIN_ATTEMPTS=${MAX_LOGIN_ATTEMPTS:-10}
      - LOGIN_LOCK_MINUTES=${LOGIN_LOCK_MINUTES:-15}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

  mongo:
    image: mongo:6-jammy
    container_name: tmzon-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  mongo_data:
