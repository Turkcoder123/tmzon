services:
  nginx:
    image: nginx:1.27-alpine
    container_name: tmzon-nginx
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - ./nginx/nginx.conf:/etc/nginx/templates/nginx.conf:ro
      - ./nginx/nginx-ssl.conf:/etc/nginx/templates/nginx-ssl.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - ./app/tmzon/dist:/usr/share/nginx/html:ro
    depends_on:
      app:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  app:
    build: .
    container_name: tmzon-app
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/tmzon
      - JWT_SECRET=${JWT_SECRET:-changeme_secret}
      - FRONTEND_URL=${FRONTEND_URL:-https://tmzon.tech,http://144.172.107.118}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

  mongo:
    image: mongo:6-jammy
    container_name: tmzon-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  mongo_data:
