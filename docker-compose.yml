version: '3.9'

services:
  app:
    build: .
    container_name: tmzon-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/tmzon
      - JWT_SECRET=${JWT_SECRET:-changeme_secret}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./app/tmzon
      dockerfile: Dockerfile
    container_name: tmzon-frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - app

  mongo:
    image: mongo:6-jammy
    container_name: tmzon-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
