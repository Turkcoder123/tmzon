# HTTP — IP adresine ve bilinmeyen host'lara gelen istekler (domain olmadan doğrudan erişim)
server {
    listen 80 default_server;
    server_name _;

    # Docker embedded DNS — app container IP değiştiğinde yeniden çözümleme yapar
    resolver 127.0.0.11 valid=5s;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Nginx container healthcheck — upstream'e bağımlı olmadan nginx'in çalışıp çalışmadığını kontrol eder
    location /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Health check proxy
    location /health {
        set $upstream http://app:3000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Backend API proxy
    location /api/ {
        set $upstream http://app:3000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Frontend statik dosyaları
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }
}

