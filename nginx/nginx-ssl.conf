# HTTP — IP adresine ve bilinmeyen host'lara gelen istekler (domain olmadan doğrudan erişim)
server {
    listen 80 default_server;
    server_name _;

    # Docker embedded DNS — app container IP değiştiğinde yeniden çözümleme yapar
    resolver 127.0.0.11 valid=5s;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Nginx container healthcheck — upstream'e bağımlı olmadan nginx'in çalışıp çalışmadığını kontrol eder
    location /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Health check proxy
    location /health {
        set $upstream http://app:3000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Backend API proxy
    location /api/ {
        set $upstream http://app:3000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Frontend statik dosyaları
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }
}

# HTTP — tmzon.tech için HTTPS yönlendirmesi
server {
    listen 80;
    server_name tmzon.tech www.tmzon.tech;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Geri kalan her şeyi HTTPS'e yönlendir
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Frontend + API proxy
server {
    listen 443 ssl;
    http2 on;
    server_name tmzon.tech www.tmzon.tech;

    # Docker embedded DNS — app container IP değiştiğinde yeniden çözümleme yapar
    resolver 127.0.0.11 valid=5s;

    ssl_certificate     /etc/letsencrypt/live/tmzon.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tmzon.tech/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # Güvenlik başlıkları
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options         SAMEORIGIN                              always;
    add_header X-Content-Type-Options  nosniff                                 always;
    add_header X-XSS-Protection        "1; mode=block"                         always;

    # Backend API proxy — /api/* isteklerini uygulama konteynerine (port 3000) ilet
    location /api/ {
        set $upstream http://app:3000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check proxy
    location /health {
        set $upstream http://app:3000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend statik dosyaları (Expo web build: app/tmzon/dist)
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }
}
